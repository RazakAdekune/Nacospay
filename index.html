                        {p.method==='squad'&&<span style={{fontSize:8,fontWeight:700,color:'var(--nacos)',background:'rgba(14,165,233,.14)',borderRadius:99,padding:'2px 6px',letterSpacing:'.4px',textTransform:'uppercase',flexShrink:0}}>ONLINE</span>}
                      </div>
                      <p className="mono" style={{fontSize:11,color:'var(--t3)'}}>{p.matric} · {p.level}L · {fmtDate(p.created_at)}</p>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <p style={{fontSize:14,fontWeight:700,color:'var(--t1)',marginBottom:4}}>{fmt(p.amount)}</p>
                      <StatusBadge status={p.status}/>
                    </div>
                  </button>
                );
              })}
            </div>
          )}
        </>}

        {/* ── STUDENTS TAB ── */}
        {tab==='students'&&<>
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginBottom:16}}>
            {[{l:'Registered',v:students.length,c:'var(--nacos)'},{l:'Have Paid',v:students.filter(s=>allPayments.some(p=>p.student_id===s.id&&p.status==='verified')).length,c:'var(--green)'}].map(s=>(
              <div key={s.l} style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:14,padding:'12px 14px'}}>
                <p style={{fontSize:10,color:'var(--t3)',fontWeight:600,letterSpacing:'.5px',textTransform:'uppercase',marginBottom:5}}>{s.l}</p>
                <p style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</p>
              </div>
            ))}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {studentSummary.map((s,i)=>{
              const col2=getCol(s.id);
              return(
                <div key={s.id} className="admin-row" style={{animationDelay:i*.03+'s',gap:12}}>
                  <div style={{width:40,height:40,borderRadius:'50%',background:col2.bg,color:col2.fg,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:12,flexShrink:0}}>{mkInit(s.name)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:13,fontWeight:700,color:'var(--t1)',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.name}</p>
                    <p className="mono" style={{fontSize:11,color:'var(--t3)'}}>{s.matric} · {s.level}L</p>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <p style={{fontSize:13,fontWeight:700,color:'var(--green)',marginBottom:3}}>{fmt(s.totalPaid)}</p>
                    <div style={{display:'flex',gap:4,justifyContent:'flex-end'}}>
                      {s.hasPending&&<div className="badge badge-pending" style={{padding:'2px 6px'}}><span style={{fontSize:9,fontWeight:700,color:'var(--amber)'}}>Pending</span></div>}
                      <div style={{background:'var(--s2)',borderRadius:99,padding:'2px 6px'}}><span style={{fontSize:9,fontWeight:700,color:'var(--t3)'}}>{s.payCount} pay</span></div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {studentSummary.length===0&&(
            <div style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:16,padding:'36px 20px',textAlign:'center'}}>
              <p style={{fontSize:32,marginBottom:8}}>👥</p>
              <p style={{fontSize:14,fontWeight:700,color:'var(--t1)'}}>No students registered yet</p>
            </div>
          )}
        </>}

        {/* ── ANALYTICS TAB ── */}
        {tab==='analytics'&&<>
          <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginBottom:20}}>
            {[
              {l:'Total Collected',v:fmt(totalVerified),c:'var(--green)'},
              {l:'Awaiting',v:fmt(totalPending),c:'var(--amber)'},
              {l:'Total Students',v:new Set(allPayments.map(p=>p.student_id)).size,c:'var(--nacos)'},
              {l:'Total Payments',v:allPayments.length,c:'var(--t1)'},
            ].map(s=>(
              <div key={s.l} style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:14,padding:'14px'}}>
                <p style={{fontSize:10,color:'var(--t3)',fontWeight:600,letterSpacing:'.5px',textTransform:'uppercase',marginBottom:6}}>{s.l}</p>
                <p style={{fontSize:19,fontWeight:800,color:s.c}}>{s.v}</p>
              </div>
            ))}
          </div>

          <p className="lbl" style={{marginBottom:14}}>By Category (Verified)</p>
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:24}}>
            {catStats.map(c=>(
              <div key={c.id} style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:14,padding:'14px'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:18}}>{c.icon}</span>
                    <div>
                      <p style={{fontSize:13,fontWeight:700,color:'var(--t1)'}}>{c.label}</p>
                      <p style={{fontSize:11,color:'var(--t3)'}}>{c.count} verified payment{c.count!==1?'s':''}</p>
                    </div>
                  </div>
                  <p style={{fontSize:15,fontWeight:800,color:'var(--green)'}}>{fmt(c.total)}</p>
                </div>
                <div className="stat-bar-wrap"><div className="stat-bar" style={{'--w':`${(c.total/maxTotal)*100}%`}}/></div>
              </div>
            ))}
            {catStats.every(c=>c.total===0)&&<p style={{fontSize:13,color:'var(--t3)',textAlign:'center',padding:'20px 0'}}>No verified payments yet</p>}
          </div>

          {levelStats.length>0&&<>
            <p className="lbl" style={{marginBottom:14}}>By Level (Verified Payments)</p>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {levelStats.map(l=>(
                <div key={l.level} style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:14,padding:'12px 14px'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:7}}>
                    <p style={{fontSize:13,fontWeight:700,color:'var(--t1)'}}>{l.level}L Students</p>
                    <div style={{textAlign:'right'}}>
                      <p style={{fontSize:13,fontWeight:700,color:'var(--green)'}}>{fmt(l.total)}</p>
                      <p style={{fontSize:10,color:'var(--t3)'}}>{l.count} payment{l.count!==1?'s':''}</p>
                    </div>
                  </div>
                  <div className="stat-bar-wrap"><div className="stat-bar" style={{'--w':`${(l.count/maxLevel)*100}%`,background:'linear-gradient(90deg,var(--indigo),var(--nacos))'}}/></div>
                </div>
              ))}
            </div>
          </>}
        </>}

        {/* ── CATEGORIES TAB ── */}
        {tab==='categories'&&<>
          <button className="btn btn-p" style={{marginBottom:16}} onClick={()=>setNewCat(true)}>
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
            Add New Category
          </button>

          {newCat&&(
            <div style={{background:'var(--s1)',border:'1.5px solid var(--nacos)',borderRadius:18,padding:'16px',marginBottom:14}}>
              <p style={{fontSize:14,fontWeight:700,color:'var(--t1)',marginBottom:14}}>New Category</p>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                <div style={{display:'flex',gap:8}}>
                  <div style={{flex:'0 0 68px'}}><p className="lbl" style={{marginBottom:7}}>Icon</p><input className="inp" style={{textAlign:'center',fontSize:22,padding:'10px'}} value={ncIcon} onChange={e=>setNcIcon(e.target.value)} maxLength={2}/></div>
                  <div style={{flex:1}}><p className="lbl" style={{marginBottom:7}}>Label</p><input className="inp" placeholder="e.g. Convocation Fee" value={ncLabel} onChange={e=>setNcLabel(e.target.value)}/></div>
                </div>
                <div><p className="lbl" style={{marginBottom:7}}>Description</p><input className="inp" placeholder="Short description" value={ncDesc} onChange={e=>setNcDesc(e.target.value)}/></div>
                <div><p className="lbl" style={{marginBottom:7}}>Preset Amounts (comma-separated ₦)</p><input className="inp" placeholder="e.g. 1000, 2000, 5000" value={ncPresets} onChange={e=>setNcPresets(e.target.value)}/></div>
                <div><p className="lbl" style={{marginBottom:7}}>Deadline (optional)</p><input className="inp" type="date" value={ncDeadline} onChange={e=>setNcDeadline(e.target.value)}/></div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-p" style={{flex:1}} onClick={saveNewCat} disabled={!ncLabel.trim()}>Save</button>
                  <button className="btn btn-s" style={{flex:1}} onClick={()=>setNewCat(false)}>Cancel</button>
                </div>
              </div>
            </div>
          )}

          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {categories.map(c=>(
              <div key={c.id} style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:16,padding:'14px 16px'}}>
                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:editCat===c.id?14:0}}>
                  <span style={{fontSize:22,flexShrink:0}}>{c.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:14,fontWeight:700,color:'var(--t1)',marginBottom:2}}>{c.label}</p>
                    <p style={{fontSize:11,color:'var(--t3)'}}>{c.desc}{c.deadline?` · ${c.deadline}`:''}</p>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                    <label className="toggle"><input type="checkbox" checked={c.open} onChange={e=>updateCategory(c.id,{open:e.target.checked})}/><span className="slider"/></label>
                    <button onClick={()=>setEditCat(editCat===c.id?null:c.id)} style={{padding:'5px 10px',borderRadius:8,border:'1px solid var(--b2)',background:'var(--s2)',color:'var(--t2)',fontSize:11,fontWeight:600,cursor:'pointer'}}>
                      {editCat===c.id?'Done':'Edit'}
                    </button>
                  </div>
                </div>
                {editCat===c.id&&(
                  <div style={{display:'flex',flexDirection:'column',gap:8,borderTop:'1px solid var(--b1)',paddingTop:12}}>
                    <div><p className="lbl" style={{marginBottom:6}}>Label</p><input className="inp" style={{padding:'10px 12px'}} value={c.label} onChange={e=>updateCategory(c.id,{label:e.target.value})}/></div>
                    <div><p className="lbl" style={{marginBottom:6}}>Description</p><input className="inp" style={{padding:'10px 12px'}} value={c.desc} onChange={e=>updateCategory(c.id,{desc:e.target.value})}/></div>
                    <div><p className="lbl" style={{marginBottom:6}}>Preset Amounts (comma-separated)</p>
                      <input className="inp" style={{padding:'10px 12px'}} placeholder="e.g. 1000,2000,5000"
                        defaultValue={c.presets.join(', ')}
                        onBlur={e=>{
                          const p=e.target.value.split(',').map(v=>parseInt(v.trim())).filter(v=>!isNaN(v)&&v>0);
                          if(p.length)updateCategory(c.id,{presets:p});
                        }}/>
                    </div>
                    <div><p className="lbl" style={{marginBottom:6}}>Deadline</p><input className="inp" type="date" style={{padding:'10px 12px'}} value={c.deadline||''} onChange={e=>updateCategory(c.id,{deadline:e.target.value})}/></div>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 0'}}>
                      <span style={{fontSize:12,color:'var(--t2)'}}>Required for all students</span>
                      <label className="toggle"><input type="checkbox" checked={c.required} onChange={e=>updateCategory(c.id,{required:e.target.checked})}/><span className="slider"/></label>
                    </div>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 0'}}>
                      <span style={{fontSize:12,color:'var(--t2)'}}>Open for payments</span>
                      <label className="toggle"><input type="checkbox" checked={c.open} onChange={e=>updateCategory(c.id,{open:e.target.checked})}/><span className="slider"/></label>
                    </div>
                    <button onClick={()=>deleteCategory(c.id)} style={{width:'100%',padding:'10px',borderRadius:10,border:'1px solid rgba(244,63,94,.3)',background:'rgba(244,63,94,.08)',color:'var(--red)',fontSize:12,fontWeight:600,cursor:'pointer',marginTop:4}}>
                      🗑 Delete Category
                    </button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </>}
      </div>
    </div>
  );
};

/* ═══════════════════════════════
   BOTTOM NAV
═══════════════════════════════ */
const NAV=[
  {k:'dashboard',l:'Home',    icon:<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>},
  {k:'pay',     l:'Pay',     icon:<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>},
  {k:'verify',  l:'Verify',  icon:<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>},
  {k:'history', l:'History', icon:<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>},
  {k:'profile', l:'Profile', icon:<svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>},
];
const MAIN=new Set(['dashboard','pay','verify','history','profile']);
const BottomNav=({screen,navigate})=>{
  if(!MAIN.has(screen))return null;
  return(
    <nav className="bnav">
      {NAV.map(n=>(
        <button key={n.k} className={`nib ${screen===n.k?'on':''}`} onClick={()=>navigate(n.k)}>
          <div className="ni">{n.icon}</div>
          <span className="nl">{n.l}</span>
        </button>
      ))}
    </nav>
  );
};

/* ═══════════════════════════════
   ROOT APP
═══════════════════════════════ */
function App(){
  const [onboard,   setOnboard]   = useState(true);
  const [student,   setStudent]   = useState(null);
  const [allPmts,   setAllPmts]   = useState([]);
  const [cats,      setCats]      = useState([]);
  const [students,  setStudents]  = useState([]);
  const [route,     setRoute]     = useState({screen:'dashboard',params:null});
  const [isAdmin,   setIsAdmin]   = useState(false);
  const [loading,   setLoading]   = useState(true);
  const [loadErr,   setLoadErr]   = useState(false);

  const navigate=(screen,params=null)=>setRoute({screen,params});
  const goAdmin=()=>{setIsAdmin(true);setRoute({screen:'admin',params:null});};
  const leaveAdmin=()=>{setIsAdmin(false);setRoute({screen:'dashboard',params:null});};

  const login=u=>{setStudent({...u});setRoute({screen:'dashboard',params:null});};
  const logout=()=>{setStudent(null);setRoute({screen:'dashboard',params:null});};

  // Derive this student's payments from the global payments list
  const payments=useMemo(()=>student?allPmts.filter(p=>p.student_id===student.id):[],[allPmts,student]);

  // Initial load from Supabase
  const loadAll=useCallback(async()=>{
    setLoading(true);setLoadErr(false);
    const [catsRes,pmtsRes,studRes]=await Promise.all([
      sb.from('categories').select('*'),
      sb.from('payments').select('*').order('created_at',{ascending:false}),
      sb.from('students').select('*'),
    ]);
    if(catsRes.error||pmtsRes.error||studRes.error){setLoadErr(true);setLoading(false);return;}
    setCats(catsRes.data||[]);
    setAllPmts(pmtsRes.data||[]);
    setStudents(studRes.data||[]);
    setLoading(false);
  },[]);

  useEffect(()=>{ loadAll(); },[loadAll]);

  // Realtime sync — keeps every device in sync (e.g. admin verifies, student sees it live)
  useEffect(()=>{
    const pmtCh=sb.channel('public:payments')
      .on('postgres_changes',{event:'*',schema:'public',table:'payments'},payload=>{
        if(payload.eventType==='INSERT'){
          setAllPmts(prev=>prev.some(p=>p.id===payload.new.id)?prev:[payload.new,...prev]);
        }else if(payload.eventType==='UPDATE'){
          setAllPmts(prev=>prev.map(p=>p.id===payload.new.id?{...p,...payload.new}:p));
        }else if(payload.eventType==='DELETE'){
          setAllPmts(prev=>prev.filter(p=>p.id!==payload.old.id));
        }
      }).subscribe();
    const catCh=sb.channel('public:categories')
      .on('postgres_changes',{event:'*',schema:'public',table:'categories'},payload=>{
        if(payload.eventType==='INSERT'){
          setCats(prev=>prev.some(c=>c.id===payload.new.id)?prev:[...prev,payload.new]);
        }else if(payload.eventType==='UPDATE'){
          setCats(prev=>prev.map(c=>c.id===payload.new.id?{...c,...payload.new}:c));
        }else if(payload.eventType==='DELETE'){
          setCats(prev=>prev.filter(c=>c.id!==payload.old.id));
        }
      }).subscribe();
    const stuCh=sb.channel('public:students')
      .on('postgres_changes',{event:'*',schema:'public',table:'students'},payload=>{
        if(payload.eventType==='INSERT'){
          setStudents(prev=>prev.some(s=>s.id===payload.new.id)?prev:[...prev,payload.new]);
        }else if(payload.eventType==='UPDATE'){
          setStudents(prev=>prev.map(s=>s.id===payload.new.id?{...s,...payload.new}:s));
        }else if(payload.eventType==='DELETE'){
          setStudents(prev=>prev.filter(s=>s.id!==payload.old.id));
        }
      }).subscribe();
    return ()=>{ sb.removeChannel(pmtCh); sb.removeChannel(catCh); sb.removeChannel(stuCh); };
  },[]);

  const changePin=async(newPin)=>{
    const {error}=await sb.from('students').update({pin:newPin}).eq('id',student.id);
    if(error)return false;
    setStudent(prev=>({...prev,pin:newPin}));
    setStudents(prev=>prev.map(s=>s.id===student.id?{...s,pin:newPin}:s));
    return true;
  };

  const processPayment=async p=>{
    const {data,error}=await sb.from('payments').insert(p).select().single();
    if(error)return null;
    const row=data||p;
    setAllPmts(prev=>prev.some(x=>x.id===row.id)?prev:[row,...prev]);
    return row;
  };

  const updateStatus=async(id,status)=>{
    setAllPmts(prev=>prev.map(p=>p.id===id?{...p,status}:p));
    await sb.from('payments').update({status}).eq('id',id);
  };

  const updateCategory=async(id,changes)=>{
    setCats(prev=>prev.map(c=>c.id===id?{...c,...changes}:c));
    await sb.from('categories').update(changes).eq('id',id);
  };

  const addCategory=async c=>{
    const {data,error}=await sb.from('categories').insert(c).select().single();
    if(error)return false;
    setCats(prev=>prev.some(x=>x.id===c.id)?prev:[...prev,data||c]);
    return true;
  };

  const deleteCategory=async id=>{
    setCats(prev=>prev.filter(c=>c.id!==id));
    await sb.from('categories').delete().eq('id',id);
  };

  const ctx={
    student,payments,allPayments:allPmts,categories:cats,students,
    navigate,login,logout,goAdmin,leaveAdmin,
    changePin,processPayment,updateStatus,
    updateCategory,addCategory,deleteCategory,
  };

  const render=()=>{
    if(loading)return(
      <div className="page-body" style={{background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14}}>
        <div className="spin" style={{width:30,height:30,borderWidth:3}}/>
        <p style={{fontSize:12,color:'var(--t3)'}}>Connecting to NACOS server…</p>
      </div>
    );
    if(loadErr)return(
      <div className="page-body" style={{background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14,padding:'0 30px',textAlign:'center'}}>
        <span style={{fontSize:36}}>⚠️</span>
        <p style={{fontSize:14,fontWeight:700,color:'var(--t1)'}}>Couldn't connect to the server</p>
        <p style={{fontSize:12,color:'var(--t3)'}}>Check your connection and try again.</p>
        <button className="btn btn-p" style={{width:'auto',padding:'10px 22px'}} onClick={loadAll}>Retry</button>
      </div>
    );
    if(isAdmin)return<AdminScreen/>;
    if(!student)return<AuthScreen/>;
    switch(route.screen){
      case 'dashboard': return<DashboardScreen/>;
      case 'profile':   return<ProfileScreen/>;
      case 'pay':       return<PayScreen/>;
      case 'receipt':   return<ReceiptScreen params={route.params}/>;
      case 'verify':    return<VerifyScreen/>;
      case 'history':   return<HistoryScreen/>;
      default:          return<DashboardScreen/>;
    }
  };

  return(
    <Ctx.Provider value={ctx}>
      <div className="shell">
        {onboard&&<Onboarding onDone={()=>setOnboard(false)}/>}
        {render()}
        {!loading&&!loadErr&&student&&!isAdmin&&<BottomNav screen={route.screen} navigate={navigate}/>}
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
