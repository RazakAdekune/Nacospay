<head>

<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{font-family:'DM Sans',sans-serif;background:#07070f;height:100%;overflow:hidden;color:#eeeeff;}
#root{display:flex;justify-content:center;height:100vh;background:#07070f;}
.shell{width:100%;max-width:430px;height:100vh;background:#0d0d1a;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.page-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page-body::-webkit-scrollbar{display:none;}

:root{
  --bg:#0d0d1a;--s1:#161625;--s2:#1c1c2e;--s3:#22223a;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.12);--b3:rgba(255,255,255,.18);
  --t1:#eeeeff;--t2:#9090b8;--t3:#55557a;
  --blue:#3b82f6;--blue2:#2563eb;--indigo:#6366f1;
  --green:#22c55e;--red:#f43f5e;--amber:#f59e0b;
  --nacos:#0ea5e9;--nacos2:#0284c7;
}

@keyframes up    {from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes fade  {from{opacity:0}to{opacity:1}}
@keyframes spin  {to{transform:rotate(360deg)}}
@keyframes check {from{stroke-dashoffset:80}to{stroke-dashoffset:0}}
@keyframes pulse {0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.28)}}
@keyframes scanL {0%,100%{top:5%}50%{top:89%}}
@keyframes splash{0%{opacity:0;transform:scale(.86)}60%{opacity:1;transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes confFall{0%{opacity:1;transform:translateY(-8px) rotate(0)}100%{opacity:0;transform:translateY(740px) rotate(720deg)}}
@keyframes glow  {0%,100%{opacity:.7}50%{opacity:1}}
@keyframes odot  {0%,100%{transform:none}50%{transform:scale(1.2)}}
@keyframes barGrow{from{width:0}to{width:var(--w)}}
@keyframes sheetUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:none}}

.pg{animation:up .3s cubic-bezier(.22,1,.36,1) both;}
.mono{font-family:'DM Mono',monospace;}
.lbl{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);}
.ns{user-select:none;-webkit-user-select:none;}

.btn{width:100%;padding:16px;border:none;border-radius:16px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s ease;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-p{background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff;box-shadow:0 6px 22px rgba(14,165,233,.28);}
.btn-p:hover{box-shadow:0 10px 30px rgba(14,165,233,.38);transform:translateY(-1px);}
.btn-p:active{transform:scale(.98);}
.btn-p:disabled{background:var(--s2);color:var(--t3);box-shadow:none;cursor:not-allowed;transform:none;}
.btn-s{background:var(--s2);color:var(--t1);border:1px solid var(--b2);}
.btn-s:active{transform:scale(.97);}
.btn-g{background:transparent;color:var(--t2);font-size:14px;}
.btn-green{background:linear-gradient(135deg,#166534,#22c55e);color:#fff;}
.btn-red{background:linear-gradient(135deg,#9f1239,#f43f5e);color:#fff;}

.inp{width:100%;padding:15px 16px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:var(--t1);background:var(--s2);border:1.5px solid var(--b2);border-radius:14px;outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--nacos);}
.inp::placeholder{color:var(--t3);}
select.inp{appearance:none;cursor:pointer;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
.amt-inp{font-family:'DM Sans',sans-serif;font-size:52px;font-weight:800;color:var(--t1);border:none;outline:none;background:transparent;width:100%;caret-color:var(--nacos);letter-spacing:-2px;}
.amt-inp::placeholder{color:var(--t3);}

.back{width:40px;height:40px;border-radius:12px;background:var(--s2);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .13s ease;flex-shrink:0;}
.back:active{transform:scale(.9);}

.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;}
.spin-dark{border-color:rgba(0,0,0,.15);border-top-color:#0ea5e9;}

.bnav{display:flex;background:var(--s1);border-top:1px solid var(--b1);padding:8px 0 max(10px,env(safe-area-inset-bottom));flex-shrink:0;}
.nib{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;border:none;background:transparent;}
.nib .ni{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;transition:all .18s cubic-bezier(.22,1,.36,1);}
.nib.on .ni{background:rgba(14,165,233,.16);}
.nib.on svg{stroke:var(--nacos);}
.nib:not(.on) svg{stroke:var(--t3);}
.nib .nl{font-size:10px;font-weight:600;}
.nib.on .nl{color:var(--nacos);}
.nib:not(.on) .nl{color:var(--t3);}

.hero{background:linear-gradient(155deg,#060614 0%,#0c1830 55%,#0d0d1a 100%);position:relative;overflow:hidden;padding:52px 20px 28px;flex-shrink:0;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 25%,rgba(14,165,233,.18) 0%,transparent 55%),radial-gradient(ellipse at 15% 80%,rgba(37,99,235,.12) 0%,transparent 50%);animation:glow 5s ease-in-out infinite;}
.hero-r1{position:absolute;top:-65px;right:-65px;width:270px;height:270px;border-radius:50%;border:65px solid rgba(255,255,255,.03);}
.hero-r2{position:absolute;bottom:-85px;left:-55px;width:240px;height:240px;border-radius:50%;border:60px solid rgba(255,255,255,.025);}

.cat-card:active{transform:scale(.98);}

.preset{padding:8px 14px;border-radius:99px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .12s ease;border:1.5px solid var(--b2);background:var(--s2);color:var(--t2);}

.badge-verified{background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.25);}

.badge-open    {background:rgba(34,197,94,.12); border:1px solid rgba(34,197,94,.25);}
.badge-closed  {background:rgba(244,63,94,.12); border:1px solid rgba(244,63,94,.25);}

.prow{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--s1);border-radius:16px;border:1px solid var(--b1);animation:fade .3s ease both;cursor:pointer;transition:background .13s;width:100%;text-align:left;}
.prow:active{background:var(--s2);}

.sover{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(to bottom,rgba(0,0,0,.75) 0%,rgba(0,0,0,.35) 40%,rgba(0,0,0,.35) 60%,rgba(0,0,0,.75) 100%);}
.sframe{position:relative;}
.scnr{position:absolute;width:24px;height:24px;}
.sbeam{position:absolute;left:6px;right:6px;height:2px;background:linear-gradient(90deg,transparent,#38bdf8,#818cf8,#38bdf8,transparent);box-shadow:0 0 14px rgba(56,189,248,.7);animation:scanL 2.2s ease-in-out infinite;}

.irow{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid #f1f5f9;}
.irow:last-child{border-bottom:none;}

.odot{height:8px;border-radius:99px;transition:all .32s cubic-bezier(.22,1,.36,1);}
.cp{position:fixed;border-radius:3px;animation:confFall linear both;pointer-events:none;z-index:9999;}

/* Bottom sheet overlay */
.sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:40;display:flex;flex-direction:column;justify-content:flex-end;}
.sheet{background:var(--s1);border-radius:24px 24px 0 0;padding:24px 20px max(24px,env(safe-area-inset-bottom));animation:sheetUp .32s cubic-bezier(.22,1,.36,1) both;max-height:90vh;overflow-y:auto;}
.sheet::-webkit-scrollbar{display:none;}
.sheet-handle{width:36px;height:4px;background:var(--b3);border-radius:99px;margin:0 auto 20px;}

/* Print receipt overlay */
.print-overlay{position:absolute;inset:0;background:#f0f4f8;z-index:50;display:flex;flex-direction:column;overflow-y:auto;}
.print-overlay::-webkit-scrollbar{display:none;}

/* Admin row */
.admin-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--s1);border:1px solid var(--b1);border-radius:14px;animation:fade .25s ease both;}

/* Toggle switch */
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;border-radius:99px;background:var(--s3);cursor:pointer;transition:.3s;}
.slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
input:checked+.slider{background:var(--nacos);}
input:checked+.slider::before{transform:translateX(20px);}

/* Stat bar */
.stat-bar-wrap{height:6px;background:var(--s3);border-radius:99px;overflow:hidden;}
.stat-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--nacos),var(--blue2));animation:barGrow .8s cubic-bezier(.22,1,.36,1) both;width:var(--w);}

/* Admin tab */
.admin-tab{flex:1;padding:9px 6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;border-radius:9px;transition:all .14s ease;}

video{display:block;}
#qr-receipt canvas,#qr-receipt img,#qr-desk canvas,#qr-desk img,#qr-verify canvas,#qr-verify img{border-radius:8px;display:block;}
</style>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext, useMemo } = React;

   ORG CONFIG
═══════════════════════════════ */

  name:'NACOS-LASU', full:'National Association of Computing Students',
  school:'Lagos State University', session:'2024/2025',
  exco:'The Visionary Led Administration', admin_pin:'0000',
};

/* ═══════════════════════════════
   SUPABASE — all data now lives in Supabase
═══════════════════════════════ */
const SUPABASE_URL = 'https://xmyyrybrnkxddmraickt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhteXlyeWJybmt4ZGRtcmFpY2t0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDQxMzEsImV4cCI6MjA5NzA4MDEzMX0.IgM54aTDRn7UqvPmQUnKwXQNuSxuX8WB4yqzUv-ByL0';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ═══════════════════════════════
   CONTEXT

/* ═══════════════════════════════
   SQUAD CONFIG — public key only here; secret lives in Edge Function
═══════════════════════════════ */
const SQUAD = {
  public_key: 'pk_9b7a6061ed20263df70491404f82fe9736a33c07',
  verify_url: `${SUPABASE_URL}/functions/v1/verify-squad-payment`,
};

const Ctx = createContext(null);
const useApp = () => useContext(Ctx);

/* ═══════════════════════════════
   UTILS
═══════════════════════════════ */
const fmt     = n  => '₦' + Number(n).toLocaleString('en-NG');
const payId   = () => 'PAY-' + Math.random().toString(36).substr(2,5).toUpperCase() + '-' + Date.now().toString(36).toUpperCase().slice(-4);
const fmtDate = d  => new Date(d).toLocaleDateString('en-NG',{day:'numeric',month:'short',year:'numeric'});
const fmtTime = d  => new Date(d).toLocaleTimeString('en-NG',{hour:'2-digit',minute:'2-digit'});
const greet   = () => {const h=new Date().getHours();return h<12?'Good morning':h<17?'Good afternoon':'Good evening';};
const mkInit  = s  => s.trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
const PAL=[{bg:'rgba(14,165,233,.16)',fg:'#38bdf8'},{bg:'rgba(99,102,241,.16)',fg:'#a5b4fc'},{bg:'rgba(34,197,94,.16)',fg:'#4ade80'},{bg:'rgba(245,158,11,.16)',fg:'#fbbf24'},{bg:'rgba(244,63,94,.16)',fg:'#fb7185'}];
const getCol  = id => {
  let h=0; const s=String(id||'');
  for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0;
  return PAL[h%PAL.length]||PAL[0];
};

/* ═══════════════════════════════
   CONFETTI
═══════════════════════════════ */
function fireConfetti(){
  const cols=['#38bdf8','#6366f1','#22c55e','#f59e0b','#f43f5e','#a78bfa'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div'); el.className='cp';
    const sz=5+Math.random()*9;
    el.style.cssText=`width:${sz}px;height:${sz*(Math.random()>.5?1:2.4)}px;left:${8+Math.random()*84}%;top:-14px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${1.3+Math.random()*2}s;animation-delay:${Math.random()*.7}s;opacity:${.7+Math.random()*.3};transform:rotate(${Math.random()*360}deg);`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),3600);
  }
}

/* ═══════════════════════════════
   SHARED COMPONENTS
═══════════════════════════════ */
const StatusBadge=({status})=>{
  const m={pending:{cls:'badge-pending',dot:'var(--amber)',txt:'var(--amber)',l:'Pending'},verified:{cls:'badge-verified',dot:'var(--green)',txt:'var(--green)',l:'Verified'},rejected:{cls:'badge-rejected',dot:'var(--red)',txt:'var(--red)',l:'Rejected'}};
  const s=m[status]||m.pending;
  return <div className={`badge ${s.cls}`}><div style={{width:5,height:5,borderRadius:'50%',background:s.dot}}/><span style={{fontSize:10,fontWeight:800,color:s.txt,letterSpacing:'.5px',textTransform:'uppercase'}}>{s.l}</span></div>;
};

const ErrBox=({msg})=>!msg?null:(
  <div style={{background:'rgba(244,63,94,.1)',border:'1px solid rgba(244,63,94,.22)',borderRadius:12,padding:'10px 14px',display:'flex',gap:8,alignItems:'center'}}>
    <svg width="14" height="14" fill="none" stroke="var(--red)" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <p style={{fontSize:12,color:'var(--red)',fontWeight:500}}>{msg}</p>
  </div>
);

const Hdr=({title,sub,onBack,disabled,right})=>(
  <div style={{padding:'52px 20px 16px',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
    <button className="back" onClick={onBack} disabled={disabled} style={disabled?{opacity:.3}:{}}>
      <svg width="18" height="18" fill="none" stroke="var(--t2)" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
    </button>
    <div style={{flex:1,minWidth:0}}>
      <p style={{fontSize:17,fontWeight:700,color:'var(--t1)'}}>{title}</p>
      {sub&&<p style={{fontSize:12,color:'var(--t2)',marginTop:1}}>{sub}</p>}
    </div>
    {right}
  </div>
);

/* ═══════════════════════════════
   RECEIPT DOWNLOAD helper
   Renders QR in a hidden div, copies it to canvas, then downloads.
═══════════════════════════════ */
function buildQRDataURL(payload, size) {
  return new Promise(resolve => {
    const tmp = document.createElement('div');
    tmp.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
    document.body.appendChild(tmp);
    try {
      new window.QRCode(tmp, { text: payload, width: size, height: size, colorDark: '#0f172a', colorLight: '#ffffff' });
    } catch(_) { document.body.removeChild(tmp); resolve(null); return; }
    // QRCode renders asynchronously via a 0ms timeout internally
    setTimeout(() => {
      const qrCanvas = tmp.querySelector('canvas');
      const url = qrCanvas ? qrCanvas.toDataURL('image/png') : null;
      document.body.removeChild(tmp);
      resolve(url);
    }, 120);
  });
}

async function downloadReceipt(payment, cats) {
  const cat = cats.find(c=>c.id===payment.category)||{label:'Payment',icon:'💳'};

  // Build QR first so we have the data URL before drawing anything
  const qrPayload = JSON.stringify({
    type:'nacos_payment_receipt', payment_id:payment.id,
    name:payment.name, matric:payment.matric,
    category:payment.category, amount:payment.amount,
    status:payment.status, org:ORG.name,
    session:ORG.session, timestamp:payment.created_at,
  });
  const qrUrl = await buildQRDataURL(qrPayload, 180);

  const W = 640, QR = 180;
  const rows = [
    ['Student',    payment.name],
    ['Matric No',  payment.matric],
    ['Level',      payment.level+'L'],
    ['Email',      payment.email||'—'],
    ['Phone',      payment.phone||'—'],
    ['Category',   cat.label],
    ...(payment.note?[['Note',payment.note]]:[]),
    ['Date',       fmtDate(payment.created_at)],
    ['Time',       fmtTime(payment.created_at)],
    ['Session',    ORG.session],
    ['Status',     payment.status.toUpperCase()],
    ['Payment ID', payment.id],
  ];
  const bodyH = rows.length * 36;
  const H = 180 + bodyH + 60 + QR + 80; // header + rows + tear + qr block + footer

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // White background
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,W,H);

  // Header gradient
  const grad = ctx.createLinearGradient(0,0,W,160);
  grad.addColorStop(0,'#0ea5e9'); grad.addColorStop(1,'#2563eb');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,160);

  ctx.fillStyle = 'rgba(255,255,255,.65)';
  ctx.font = '600 17px sans-serif';
  ctx.fillText(`${ORG.name} · ${ORG.session}`, 32, 50);

  ctx.fillStyle = '#fff';
  ctx.font = '800 26px sans-serif';
  ctx.fillText(`${cat.label}`, 32, 90);

  ctx.font = '800 40px sans-serif';
  ctx.fillText(fmt(payment.amount), 32, 142);

  // Body rows
  let y = 192;
  rows.forEach(([l,v]) => {
    ctx.fillStyle = '#6b7280'; ctx.font = '500 15px sans-serif';
    ctx.fillText(l, 32, y);
    ctx.fillStyle = '#111827'; ctx.font = '700 15px sans-serif';
    const val = String(v);
    // wrap long values
    if(ctx.measureText(val).width > 340) {
      ctx.font = '600 12px sans-serif';
      ctx.fillText(val.slice(0,44), 210, y);
      ctx.fillText(val.slice(44,88), 210, y+14);
    } else {
      ctx.fillText(val.slice(0,55), 210, y);
    }
    ctx.fillStyle = '#f1f5f9'; ctx.fillRect(32, y+10, W-64, 1);
    y += 36;
  });

  // Tear dashes
  y += 14;
  ctx.setLineDash([8,6]); ctx.strokeStyle='#d1d5db'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(32,y); ctx.lineTo(W-32,y); ctx.stroke();
  ctx.setLineDash([]); y += 24;

  // QR section
  ctx.fillStyle = '#f0f9ff';
  ctx.beginPath(); ctx.roundRect(32, y, W-64, QR+56, 12); ctx.fill();
  ctx.strokeStyle = '#bae6fd'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(32, y, W-64, QR+56, 12); ctx.stroke();

  ctx.fillStyle = '#0369a1'; ctx.font = '700 14px sans-serif';
  ctx.textAlign = 'center'; ctx.fillText('📱  Scan to Verify Payment', W/2, y+22);

  if(qrUrl) {
    const qrImg = new Image();
    await new Promise(res => { qrImg.onload=res; qrImg.onerror=res; qrImg.src=qrUrl; });
    // white background behind QR
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.roundRect(W/2-QR/2-8, y+30, QR+16, QR+16, 8); ctx.fill();
    ctx.drawImage(qrImg, W/2-QR/2, y+38, QR, QR);
  } else {
    ctx.fillStyle='#9ca3af'; ctx.font='500 12px sans-serif';
    ctx.fillText('(QR available in app)', W/2, y+60);
  }

  y += QR + 56 + 16;

  // Footer
  ctx.fillStyle = '#9ca3af'; ctx.font = '500 12px sans-serif';
  ctx.fillText(`${ORG.full} · ${ORG.school}`, W/2, y+10);
  ctx.fillText('This receipt is computer generated', W/2, y+28);
  ctx.textAlign = 'left';

  // Trigger download
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `${payment.id}.png`;
  a.click();
}

const AuthScreen=()=>{
  const {login,goAdmin}=useApp();
  const [tab,setTab]=useState('login');
  const [matric,setMatric]=useState('');
  const [name,setName]=useState('');
  const [level,setLevel]=useState('');
  const [email,setEmail]=useState('');
  const [phone,setPhone]=useState('');
  const [pin,setPin]=useState('');
  const [pin2,setPin2]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const clear=()=>setErr('');
  const reset=t=>{setTab(t);setErr('');setMatric('');setName('');setLevel('');setEmail('');setPhone('');setPin('');setPin2('');setBusy(false);};

  const doLogin=async()=>{
    setErr('');
    setBusy(true);
    const {data,error}=await sb.from('students').select('*').eq('matric',matric.trim()).eq('pin',pin).maybeSingle();
    setBusy(false);
    if(error){setErr('Could not reach the server. Try again.');return;}
    if(!data){setErr('Matric number or PIN is incorrect');return;}
    setBusy(true);setTimeout(()=>login(data),700);
  };
  const doSignup=async()=>{
    setErr('');
    if(!name.trim())setErr('Enter your full name');
    else if(!matric.trim()||!/^\d{9}$/.test(matric.trim()))setErr('Matric must be 9 digits (e.g. 220591363)');
    else if(!level)setErr('Select your level');
    else if(!email.trim()||!email.includes('@'))setErr('Enter a valid email');
    else if(!phone.trim()||phone.replace(/\D/g,'').length<10)setErr('Enter a valid phone number');
    else if(pin.length<4)setErr('PIN must be 4 digits');
    else if(pin!==pin2)setErr("PINs don't match");
    else{
      setBusy(true);
      const {data:existing}=await sb.from('students').select('id').eq('matric',matric.trim()).maybeSingle();
      if(existing){setBusy(false);setErr('Matric number already registered');return;}
      const nu={id:'s'+Date.now(),name:name.trim(),matric:matric.trim(),level,email:email.trim(),phone:phone.trim(),pin};
      const {data,error}=await sb.from('students').insert(nu).select().single();
      if(error){setBusy(false);setErr('Could not create account. Try again.');return;}
      setTimeout(()=>login(data),700);
    }
  };

  return(
    <div className="pg page-body" style={{background:'var(--bg)'}}>
      <div style={{background:'linear-gradient(155deg,#060614 0%,#0c1830 55%,#0d0d1a 100%)',padding:'60px 24px 44px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-60,right:-60,width:240,height:240,borderRadius:'50%',border:'60px solid rgba(14,165,233,.06)'}}/>
        <div style={{position:'absolute',bottom:-75,left:-50,width:210,height:210,borderRadius:'50%',border:'55px solid rgba(37,99,235,.05)'}}/>
        <div style={{position:'relative',zIndex:1}}>
          <div style={{width:56,height:56,borderRadius:18,background:'linear-gradient(135deg,#0ea5e9,#2563eb)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:18,boxShadow:'0 8px 28px rgba(14,165,233,.38)',fontSize:28}}>🎓</div>
          <p style={{color:'#fff',fontSize:30,fontWeight:800,letterSpacing:'-1px',lineHeight:1}}>{ORG.name}</p>
          <p style={{color:'rgba(255,255,255,.35)',fontSize:13,marginTop:6}}>{ORG.full}</p>
          <p style={{color:'rgba(255,255,255,.25)',fontSize:12,marginTop:2}}>{ORG.school} · {ORG.session}</p>
        </div>
      </div>
      <div style={{padding:'22px 20px 44px'}}>
        <div style={{display:'flex',background:'var(--s2)',borderRadius:14,padding:4,marginBottom:22}}>
          {['login','signup'].map(t=>(
            <button key={t} className="atab" onClick={()=>reset(t)}
              style={{background:tab===t?'var(--s1)':'transparent',color:tab===t?'var(--t1)':'var(--t3)',boxShadow:tab===t?'0 1px 6px rgba(0,0,0,.35)':'none'}}>
              {t==='login'?'Sign In':'Register'}
            </button>
          ))}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:11}}>
          {tab==='signup'&&<div><p className="lbl" style={{marginBottom:7}}>Full Name</p><input className="inp" placeholder="e.g. Adeleke Johnson" value={name} onChange={e=>{setName(e.target.value);clear();}}/></div>}
          <div><p className="lbl" style={{marginBottom:7}}>Matric Number</p><input className="inp" placeholder="e.g. 220591363" value={matric} onChange={e=>{setMatric(e.target.value.replace(/\D/g,'').slice(0,9));clear();}}/></div>
          {tab==='signup'&&<>
            <div><p className="lbl" style={{marginBottom:7}}>Level</p>
              <select className="inp" value={level} onChange={e=>{setLevel(e.target.value);clear();}}>
                <option value="">Select level</option>
                {['100','200','300','400','500'].map(l=><option key={l} value={l}>{l}L</option>)}
              </select>
            </div>
            <div><p className="lbl" style={{marginBottom:7}}>Email</p><input className="inp" type="email" placeholder="you@lasu.edu.ng" value={email} onChange={e=>{setEmail(e.target.value);clear();}}/></div>
            <div><p className="lbl" style={{marginBottom:7}}>Phone</p><input className="inp" type="tel" placeholder="080XXXXXXXX" value={phone} onChange={e=>{setPhone(e.target.value);clear();}}/></div>
          </>}
          <div><p className="lbl" style={{marginBottom:7}}>4-digit PIN</p><input className="inp" type="password" inputMode="numeric" maxLength={4} placeholder="••••" value={pin} onChange={e=>{setPin(e.target.value.replace(/\D/g,'').slice(0,4));clear();}}/></div>
          {tab==='signup'&&<div><p className="lbl" style={{marginBottom:7}}>Confirm PIN</p><input className="inp" type="password" inputMode="numeric" maxLength={4} placeholder="••••" value={pin2} onChange={e=>{setPin2(e.target.value.replace(/\D/g,'').slice(0,4));clear();}}/></div>}
          <ErrBox msg={err}/>
          <button className="btn btn-p" style={{marginTop:4}} onClick={tab==='login'?doLogin:doSignup} disabled={busy}>
            {busy?<><div className="spin"/>{tab==='login'?'Signing in…':'Creating account…'}</>:tab==='login'?'Sign In →':'Create Account →'}
          </button>
          {tab==='login'&&(
            <div style={{background:'var(--s2)',border:'1px solid var(--b1)',borderRadius:12,padding:'14px 16px'}}>
              <p style={{fontSize:11,color:'var(--t3)',fontWeight:600,marginBottom:8,letterSpacing:'.6px',textTransform:'uppercase'}}>Demo</p>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>

                <div style={{textAlign:'right'}}><p style={{fontSize:11,color:'var(--t3)'}}>PIN</p><p style={{fontSize:20,fontWeight:800,color:'var(--t1)',letterSpacing:'4px'}}>1234</p></div>
              </div>
              <div style={{height:1,background:'var(--b1)',marginBottom:10}}/>
              <button className="btn btn-s" style={{fontSize:13,padding:'10px'}} onClick={goAdmin}>
                🔒 Admin Login
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

const ProfileScreen=()=>{
  const {student,navigate,logout,changePin}=useApp();
  const col=getCol(student.id);
  const [editPin,setEditPin]=useState(false);
  const [oldPin,setOldPin]=useState('');

  const [newPin2,setNewPin2]=useState('');
  const [pinErr,setPinErr]=useState('');
  const [pinOk,setPinOk]=useState(false);

  const doChangePin=async()=>{
    setPinErr('');
    if(oldPin!==student.pin){setPinErr('Current PIN is incorrect');return;}
    if(newPin.length<4){setPinErr('New PIN must be 4 digits');return;}
    if(newPin!==newPin2){setPinErr("New PINs don't match");return;}

    if(!ok){setPinErr('Could not update PIN. Try again.');return;}
    setPinOk(true);setEditPin(false);setOldPin('');setNewPin('');setNewPin2('');

  return(
    <div className="pg page-body" style={{background:'var(--bg)'}}>

        {/* Info card */}

          {[
            {l:'Level',       v:student.level+'L'},
            {l:'Email',       v:student.email||'—'},
            {l:'Phone',       v:student.phone||'—'},
            {l:'Session',     v:ORG.session},
            {l:'Organisation',v:ORG.name},
          ].map((r,i,arr)=>(
            <div key={r.l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 18px',borderBottom:i<arr.length-1?'1px solid var(--b1)':'none'}}>
              <span style={{fontSize:13,color:'var(--t3)'}}>{r.l}</span>
              <span style={{fontSize:13,fontWeight:600,color:'var(--t1)',textAlign:'right',maxWidth:'60%',wordBreak:'break-all'}}>{r.v}</span>
            </div>
          ))}
        </div>

        {/* Change PIN */}
        <div style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:18,padding:'16px',marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:editPin?16:0}}>
            <div>
              <p style={{fontSize:14,fontWeight:700,color:'var(--t1)',marginBottom:2}}>Change PIN</p>
              <p style={{fontSize:12,color:'var(--t3)'}}>Update your 4-digit security PIN</p>
            </div>
            <button onClick={()=>{setEditPin(!editPin);setPinErr('');}} style={{padding:'7px 14px',borderRadius:10,border:'1px solid var(--b2)',background:'var(--s2)',color:'var(--t1)',fontSize:12,fontWeight:600,cursor:'pointer'}}>
              {editPin?'Cancel':'Change'}
            </button>
          </div>
          {editPin&&(
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <div><p className="lbl" style={{marginBottom:6}}>Current PIN</p><input className="inp" style={{padding:'12px 14px'}} type="password" inputMode="numeric" maxLength={4} placeholder="••••" value={oldPin} onChange={e=>{setOldPin(e.target.value.replace(/\D/g,'').slice(0,4));setPinErr('');}}/></div>
              <div><p className="lbl" style={{marginBottom:6}}>New PIN</p><input className="inp" style={{padding:'12px 14px'}} type="password" inputMode="numeric" maxLength={4} placeholder="••••" value={newPin} onChange={e=>{setNewPin(e.target.value.replace(/\D/g,'').slice(0,4));setPinErr('');}}/></div>

              <ErrBox msg={pinErr}/>
              <button className="btn btn-p" onClick={doChangePin} disabled={!oldPin||!newPin||!newPin2}>Save New PIN</button>
            </div>
          )}
          {pinOk&&<p style={{fontSize:12,color:'var(--green)',fontWeight:600,marginTop:8}}>✓ PIN updated successfully</p>}
        </div>

        <button className="btn btn-s" style={{color:'var(--red)',borderColor:'rgba(244,63,94,.25)'}} onClick={logout}>
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Sign Out
        </button>
      </div>
    </div>
  );
};

              <svg width="20" height="20" fill="none" stroke="var(--green)" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>

          <div style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:16,padding:'36px 20px',textAlign:'center'}}>

            <p style={{fontSize:14,fontWeight:700,color:'var(--t1)',marginBottom:4}}>No payments yet</p>
            <p style={{fontSize:12,color:'var(--t3)'}}>Tap "Make Payment" to get started</p>

        ):(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {recent.map((p,i)=>{
              const cat=categories.find(c=>c.id===p.category)||{icon:'💳',label:'Payment'};
              return(
                <button key={p.id} className="prow" style={{animationDelay:i*.04+'s'}} onClick={()=>navigate('receipt',{payment:p,isNew:false})}>
                  <div style={{width:44,height:44,borderRadius:13,background:'rgba(14,165,233,.1)',border:'1px solid rgba(14,165,233,.14)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{cat.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:13,fontWeight:700,color:'var(--t1)',marginBottom:2}}>{cat.label}</p>
                    <p style={{fontSize:11,color:'var(--t3)'}}>{fmtDate(p.created_at)} · {fmtTime(p.created_at)}</p>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <p style={{fontSize:14,fontWeight:700,color:'var(--t1)',marginBottom:5}}>{fmt(p.amount)}</p>
                    <StatusBadge status={p.status}/>
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
};

/* ═══════════════════════════════
   PAY — Step 1: Category  Step 2: Amount  Step 3: Confirm
═══════════════════════════════ */
const PayScreen=()=>{
  const {student,processPayment,navigate,categories,payments}=useApp();
  const [step,setStep]=useState(1);
  const [cat,setCat]=useState(null);
  const [amount,setAmount]=useState('');
  const [note,setNote]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const [dupWarn,setDupWarn]=useState(false);
  const inp=useRef(null);
  useEffect(()=>{if(step===2)setTimeout(()=>inp.current?.focus(),200);},[step]);

  const n=parseInt(amount)||0;

  const handleCatSelect=(c)=>{
    if(!c.open)return;
    const existing=payments.find(p=>p.category===c.id&&p.status==='verified');
    setCat(c); setAmount(''); setErr('');
    if(existing){ setDupWarn(true); }
    else{ setStep(2); }
  };

  const confirm=()=>{
    if(!n||n<=0){setErr('Enter the payment amount');return;}
    setStep(3);
  };

  // Manual submit (no online payment) — stays pending for admin verification
  const sendManual=async()=>{
    setBusy(true);setErr('');
    const payment={
      id:payId(),student_id:student.id,name:student.name,matric:student.matric,
      level:student.level,email:student.email,phone:student.phone,
      category:cat.id,amount:n,note:note.trim(),
      status:'pending',method:'manual',squad_ref:null,
      created_at:new Date().toISOString(),
    };
    const saved=await processPayment(payment);
    if(!saved){setBusy(false);setErr('Could not submit payment. Check your connection and try again.');return;}
    navigate('receipt',{payment:saved,isNew:true});
  };

  // Squad online payment — opens checkout, then verifies server-side
  const payWithSquad=()=>{
    if(busy)return;

    // Guard: make sure Squad SDK loaded
    if(typeof window.squad === 'undefined'){
      setErr('Squad payment could not load. Please refresh the page and try again.');
      return;
    }

    const txRef='NACOS-'+payId();
    setBusy(true);setErr('');

    const squadInstance=new window.squad({
      onClose: ()=>{ setBusy(false); },
      onLoad:  ()=>{},
      onSuccess: async(resp)=>{
        // resp.transaction_ref is the confirmed ref from Squad
        const ref=resp?.transaction_ref||txRef;
        setBusy(true);
        try{
          const vRes=await fetch(SQUAD.verify_url,{
            method:'POST',
            headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_ANON_KEY}`},
            body:JSON.stringify({transaction_ref:ref}),
          });
          const vData=await vRes.json();
          if(!vRes.ok||vData.status!=='success'){
            setBusy(false);
            setErr(vData.message||'Payment verification failed. Contact NACOS if you were charged. Ref: '+ref);
            return;
          }
          // Server confirmed — save as verified
          const payment={
            id:payId(),student_id:student.id,name:student.name,matric:student.matric,
            level:student.level,email:student.email,phone:student.phone,
            category:cat.id,amount:n,note:note.trim(),
            status:'verified',method:'squad',squad_ref:ref,
            created_at:new Date().toISOString(),
          };
          const saved=await processPayment(payment);
          if(!saved){setBusy(false);setErr('Verified but could not save — contact NACOS with ref: '+ref);return;}
          navigate('receipt',{payment:saved,isNew:true});
        }catch(e){
          setBusy(false);
          setErr('Verification error. Contact NACOS with ref: '+ref);
        }
      },
      key: SQUAD.public_key,
      email: student.email||`${student.matric}@nacos.lasu.edu.ng`,
      amount: n * 100,
      currency_code: 'NGN',
      transaction_ref: txRef,
      customer_name: student.name,
      metadata:{
        student_id:student.id,
        matric:student.matric,
        level:student.level,
        category:cat.id,
        note:note.trim(),
        org:ORG.name,
        session:ORG.session,
      },
    });
    squadInstance.setup();
    squadInstance.open();
  };

  // Step 1: Category
  if(step===1) return(
    <div className="pg page-body" style={{background:'var(--bg)'}}>
      <Hdr title="Make Payment" sub="Select a payment category" onBack={()=>navigate('dashboard')}/>

      {/* Duplicate warning bottom sheet */}
      {dupWarn&&cat&&(
        <div className="sheet-overlay" onClick={()=>setDupWarn(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"/>
            <div style={{textAlign:'center',marginBottom:20}}>
              <div style={{fontSize:40,marginBottom:10}}>⚠️</div>
              <p style={{fontSize:16,fontWeight:800,color:'var(--t1)',marginBottom:6}}>Already Paid</p>
              <p style={{fontSize:13,color:'var(--t2)',lineHeight:1.6}}>
                You already have a verified <strong style={{color:'var(--t1)'}}>{cat.label}</strong> payment for {ORG.session}. Are you sure you want to pay again?
              </p>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <button className="btn btn-p" onClick={()=>{setDupWarn(false);setStep(2);}}>
                Yes, pay again anyway
              </button>
              <button className="btn btn-s" onClick={()=>{setDupWarn(false);setCat(null);}}>
                Cancel
              </button>
            </div>
          </div>
        </div>
      )}

      <div style={{padding:'0 16px 32px'}}>
        <p className="lbl" style={{marginBottom:14}}>Available Categories — {ORG.session}</p>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {categories.map(c=>{
            const alreadyPaid=payments.find(p=>p.category===c.id&&p.status==='verified');
            return(
              <button key={c.id} className={`cat-card ${!c.open?'closed':''}`}
                onClick={()=>handleCatSelect(c)}>
                <div style={{width:50,height:50,background:'rgba(14,165,233,.1)',border:'1px solid rgba(14,165,233,.15)',borderRadius:15,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{c.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3,flexWrap:'wrap'}}>
                    <p style={{fontSize:14,fontWeight:700,color:'var(--t1)'}}>{c.label}</p>
                    {c.required&&<span style={{fontSize:9,fontWeight:700,color:'var(--red)',background:'rgba(244,63,94,.12)',borderRadius:99,padding:'2px 6px',letterSpacing:'.4px',textTransform:'uppercase'}}>Required</span>}
                    {alreadyPaid&&<span style={{fontSize:9,fontWeight:700,color:'var(--green)',background:'rgba(34,197,94,.12)',borderRadius:99,padding:'2px 6px',letterSpacing:'.4px',textTransform:'uppercase'}}>✓ Paid</span>}
                    <div className={`badge ${c.open?'badge-open':'badge-closed'}`} style={{padding:'2px 7px'}}>
                      <div style={{width:4,height:4,borderRadius:'50%',background:c.open?'var(--green)':'var(--red)'}}/>
                      <span style={{fontSize:9,fontWeight:700,color:c.open?'var(--green)':'var(--red)',letterSpacing:'.4px',textTransform:'uppercase'}}>{c.open?'Open':'Closed'}</span>
                    </div>
                  </div>
                  <p style={{fontSize:11,color:'var(--t3)'}}>{c.desc}{c.deadline?` · Due ${c.deadline}`:''}</p>
                  {!c.open&&<p style={{fontSize:11,color:'var(--red)',marginTop:3,fontWeight:500}}>Payments closed{c.deadline?` — deadline was ${c.deadline}`:''}</p>}
                </div>
                {c.open&&<svg width="18" height="18" fill="none" stroke="var(--t3)" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>}
                {!c.open&&<svg width="18" height="18" fill="none" stroke="var(--red)" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v.01M12 9v4"/><circle cx="12" cy="12" r="9" strokeWidth={2}/></svg>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );

  // Step 2: Amount
  if(step===2) return(
    <div className="pg page-body" style={{background:'var(--bg)'}}>
      <Hdr title={cat.label} sub="Enter payment amount" onBack={()=>setStep(1)} disabled={busy}/>
      <div style={{padding:'0 16px 32px'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:16,padding:'14px 16px',marginBottom:20}}>
          <div style={{width:46,height:46,background:'rgba(14,165,233,.1)',borderRadius:13,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{cat.icon}</div>
          <div>
            <p style={{fontSize:14,fontWeight:700,color:'var(--t1)',marginBottom:2}}>{cat.label}</p>
            <p style={{fontSize:12,color:'var(--t3)'}}>{cat.desc}</p>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12,background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:16,padding:'14px 16px',marginBottom:20}}>
          <div style={{width:40,height:40,background:'linear-gradient(135deg,rgba(14,165,233,.2),rgba(37,99,235,.2))',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🏛️</div>
          <div style={{flex:1}}><p style={{fontSize:11,color:'var(--t3)',marginBottom:2}}>Paying to</p><p style={{fontSize:13,fontWeight:700,color:'var(--t1)'}}>{ORG.name} · {ORG.school}</p></div>
        </div>
        <div style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:20,padding:'22px',marginBottom:14}}>
          <p className="lbl" style={{marginBottom:16}}>Amount</p>
          <div style={{display:'flex',alignItems:'center',borderBottom:`2.5px solid ${err&&!n?'var(--red)':n>0?'var(--nacos)':'var(--b2)'}`,paddingBottom:16,marginBottom:18,transition:'border-color .2s'}}>
            <span style={{fontSize:52,fontWeight:800,color:n>0?'var(--t1)':'var(--t3)',marginRight:6,lineHeight:1,userSelect:'none',letterSpacing:'-2px'}}>₦</span>
            <input ref={inp} className="amt-inp" type="number" placeholder="0"
              value={amount} onChange={e=>{setAmount(e.target.value.replace(/[^0-9]/g,''));setErr('');}}
              onKeyDown={e=>e.key==='Enter'&&n>0&&confirm()}/>
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {cat.presets.map(p=>(
              <button key={p} className={`preset ${n===p?'on':''}`} onClick={()=>{setAmount(String(p));setErr('');}}>{fmt(p)}</button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <p className="lbl" style={{marginBottom:8}}>Note (optional)</p>
          <input className="inp" placeholder="e.g. First semester 2024/2025" value={note} onChange={e=>setNote(e.target.value)}/>
        </div>
        <ErrBox msg={err}/>{err&&<div style={{height:12}}/>}
        <button className="btn btn-p" onClick={confirm} disabled={!n}>Review Payment →</button>
      </div>
    </div>
  );

  // Step 3: Confirm + choose payment method
  return(
    <div className="pg page-body" style={{background:'var(--bg)'}}>
      <Hdr title="Confirm Payment" sub="Choose how to pay" onBack={()=>setStep(2)} disabled={busy}/>
      <div style={{padding:'0 16px 32px'}}>
        {/* Summary card */}
        <div style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:20,overflow:'hidden',marginBottom:16}}>
          <div style={{background:'linear-gradient(135deg,#0ea5e9,#2563eb)',padding:'20px'}}>
            <p style={{fontSize:12,color:'rgba(255,255,255,.65)',marginBottom:6}}>You are paying</p>
            <p style={{fontSize:40,fontWeight:800,color:'#fff',letterSpacing:'-1.5px'}}>{fmt(n)}</p>
          </div>
          <div style={{padding:'16px 20px'}}>
            {[
              {l:'For',    v:`${cat.icon}  ${cat.label}`},
              {l:'To',     v:`${ORG.name} · ${ORG.school}`},
              {l:'Name',   v:student.name},
              {l:'Matric', v:student.matric},
              {l:'Level',  v:student.level+'L'},
              ...(note?[{l:'Note',v:note}]:[]),
              {l:'Session',v:ORG.session},
            ].map(r=>(
              <div key={r.l} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--b1)'}}>
                <span style={{fontSize:12,color:'var(--t3)'}}>{r.l}</span>
                <span style={{fontSize:12,fontWeight:700,color:'var(--t1)',textAlign:'right',maxWidth:'60%'}}>{r.v}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Payment method chooser */}
        <p className="lbl" style={{marginBottom:10}}>Choose payment method</p>

        {/* Squad online payment */}
        <button disabled={busy} onClick={payWithSquad} style={{
          width:'100%',display:'flex',alignItems:'center',gap:14,
          background:'linear-gradient(135deg,rgba(14,165,233,.12),rgba(37,99,235,.12))',
          border:'1.5px solid rgba(14,165,233,.4)',borderRadius:18,
          padding:'16px 18px',marginBottom:10,cursor:'pointer',transition:'all .14s ease',
          opacity:busy?0.6:1,
        }}>
          <div style={{width:46,height:46,background:'linear-gradient(135deg,#0ea5e9,#2563eb)',borderRadius:13,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:22}}>💳</div>
          <div style={{flex:1,textAlign:'left'}}>
            <p style={{fontSize:14,fontWeight:800,color:'var(--t1)',marginBottom:2}}>Pay Online Now</p>
            <p style={{fontSize:11,color:'var(--t3)'}}>Card · Bank transfer · USSD · Pay instantly via Squad</p>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
            <span style={{fontSize:9,fontWeight:700,color:'var(--green)',background:'rgba(34,197,94,.14)',borderRadius:99,padding:'3px 8px',letterSpacing:'.4px',textTransform:'uppercase'}}>Auto-Verified</span>
            <svg width="16" height="16" fill="none" stroke="var(--nacos)" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
          </div>
        </button>

        {/* Manual submit */}
        <button disabled={busy} onClick={sendManual} style={{
          width:'100%',display:'flex',alignItems:'center',gap:14,
          background:'var(--s1)',border:'1.5px solid var(--b1)',borderRadius:18,
          padding:'16px 18px',marginBottom:18,cursor:'pointer',transition:'all .14s ease',
          opacity:busy?0.6:1,
        }}>
          <div style={{width:46,height:46,background:'rgba(245,158,11,.12)',borderRadius:13,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:22}}>🧾</div>
          <div style={{flex:1,textAlign:'left'}}>
            <p style={{fontSize:14,fontWeight:800,color:'var(--t1)',marginBottom:2}}>Submit for Verification</p>
            <p style={{fontSize:11,color:'var(--t3)'}}>Pay cash to NACOS · Submit receipt for manual approval</p>
          </div>
          <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
            <span style={{fontSize:9,fontWeight:700,color:'var(--amber)',background:'rgba(245,158,11,.14)',borderRadius:99,padding:'3px 8px',letterSpacing:'.4px',textTransform:'uppercase'}}>Pending</span>
            <svg width="16" height="16" fill="none" stroke="var(--t3)" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
          </div>
        </button>

        {busy&&(
          <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:10,marginBottom:12}}>
            <div className="spin"/>
            <span style={{fontSize:13,color:'var(--t2)'}}>Processing, please wait…</span>
          </div>
        )}
        <ErrBox msg={err}/>{err&&<div style={{height:12}}/>}
        <button className="btn btn-g" onClick={()=>setStep(2)} disabled={busy}>Edit Amount</button>
      </div>
    </div>
  );
};

/* ═══════════════════════════════
   RECEIPT — with print view + download
═══════════════════════════════ */
const ReceiptScreen=({params})=>{
  const {navigate,allPayments,categories}=useApp();
  const payment=params?.payment;
  const isNew=params?.isNew!==false;
  const qrRef=useRef(null);
  const fired=useRef(false);
  const [showPrint,setShowPrint]=useState(false);
  const [downloading,setDownloading]=useState(false);

  useEffect(()=>{if(!fired.current&&isNew){fireConfetti();fired.current=true;}},[]);

  const live=allPayments.find(p=>p.id===payment?.id)||payment;

  useEffect(()=>{
    let alive=true;
    const t=setTimeout(()=>{
      if(!alive||!qrRef.current||!live||!window.QRCode)return;
      qrRef.current.innerHTML='';
      new window.QRCode(qrRef.current,{
        text:JSON.stringify({type:'nacos_payment_receipt',payment_id:live.id,name:live.name,matric:live.matric,category:live.category,amount:live.amount,status:live.status,org:ORG.name,session:ORG.session,timestamp:live.created_at}),
        width:180,height:180,colorDark:'#0f172a',colorLight:'#ffffff',
      });
    },80);
    return()=>{ alive=false; clearTimeout(t); };
  },[live?.id, live?.status]);

  if(!payment){navigate('dashboard');return null;}
  const cat=categories.find(c=>c.id===payment.category)||{icon:'💳',label:'Payment'};

  const handleDownload=async()=>{
    setDownloading(true);
    await downloadReceipt(live,categories);
    setTimeout(()=>setDownloading(false),800);
  };

  /* ── Printable receipt overlay ── */
  if(showPrint) return(
    <div className="print-overlay">
      <div style={{padding:'16px 16px 0',display:'flex',alignItems:'center',gap:10,background:'#f0f4f8',position:'sticky',top:0,zIndex:1,borderBottom:'1px solid #e2e8f0'}}>
        <button onClick={()=>setShowPrint(false)} style={{width:36,height:36,borderRadius:10,background:'#fff',border:'1px solid #e2e8f0',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
          <svg width="16" height="16" fill="none" stroke="#374151" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
        </button>
        <p style={{fontSize:14,fontWeight:700,color:'#111827',flex:1}}>Printable Receipt</p>
        <button onClick={handleDownload} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:'#0ea5e9',border:'none',borderRadius:10,color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer'}}>
          {downloading?<div className="spin" style={{width:14,height:14,borderWidth:2}}/>:<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>}
          Save PNG
        </button>
      </div>
      {/* The white receipt */}
      <div style={{flex:1,padding:'20px 16px 40px',background:'#f0f4f8'}}>
        <div style={{background:'#fff',borderRadius:20,overflow:'hidden',boxShadow:'0 4px 24px rgba(0,0,0,.12)'}}>
          <div style={{background:'linear-gradient(135deg,#0ea5e9,#2563eb)',padding:'22px'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
              <span style={{fontSize:24}}>{cat.icon}</span>
              <div>
                <p style={{fontSize:12,color:'rgba(255,255,255,.65)',fontWeight:600}}>{ORG.name} · {ORG.session}</p>
                <p style={{fontSize:16,fontWeight:800,color:'#fff'}}>{cat.label}</p>
              </div>
              <div style={{marginLeft:'auto'}}>
                <StatusBadge status={live.status}/>
              </div>
            </div>
            <p style={{fontSize:34,fontWeight:800,color:'#fff',letterSpacing:'-1.5px'}}>{fmt(live.amount)}</p>
          </div>
          <div style={{padding:'18px 20px'}}>
            {[
              {l:'Student', v:live.name},{l:'Matric No',v:live.matric},{l:'Level',v:live.level+'L'},
              {l:'Email',v:live.email||'—'},{l:'Phone',v:live.phone||'—'},{l:'Category',v:cat.label},
              {l:'Method',v:live.method==='squad'?'Online (Squad)':'Manual / Cash'},
              ...(live.squad_ref?[{l:'Squad Ref',v:live.squad_ref}]:[]),
              ...(live.note?[{l:'Note',v:live.note}]:[]),

              {l:'Session',v:ORG.session},{l:'Organisation',v:ORG.name},
            ].map(r=>(
              <div key={r.l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #f1f5f9'}}>
                <span style={{fontSize:12,color:'#6b7280',fontWeight:500,flex:'0 0 100px'}}>{r.l}</span>
                <span style={{fontSize:12,fontWeight:700,color:'#111827',textAlign:'right',flex:1,wordBreak:'break-all'}}>{r.v}</span>
              </div>
            ))}
            {/* Payment ID */}
            <div style={{background:'#f8fafc',borderRadius:10,padding:'10px 12px',margin:'12px 0'}}>
              <p style={{fontSize:10,color:'#9ca3af',fontWeight:600,letterSpacing:'.5px',textTransform:'uppercase',marginBottom:3}}>Payment ID</p>
              <p style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'#374151',wordBreak:'break-all'}}>{live.id}</p>
            </div>
            {/* Tear */}
            <div style={{display:'flex',alignItems:'center',overflow:'hidden',margin:'12px -20px'}}>
              <div style={{width:16,height:16,borderRadius:'50%',background:'#f0f4f8',border:'1px solid #e2e8f0',marginLeft:-8,flexShrink:0}}/>
              <div style={{flex:1,borderTop:'1.5px dashed #e2e8f0'}}/>
              <div style={{width:16,height:16,borderRadius:'50%',background:'#f0f4f8',border:'1px solid #e2e8f0',marginRight:-8,flexShrink:0}}/>
            </div>
            {/* QR */}
            <PrintQR payment={live}/>
            <p style={{fontSize:10,color:'#9ca3af',textAlign:'center',marginTop:14}}>This is a computer-generated receipt · {ORG.full} · {ORG.school}</p>
          </div>
        </div>
      </div>
    </div>
  );

  return(
    <div className="pg page-body" style={{background:'var(--bg)'}}>
      <div style={{padding:'52px 16px 0'}}>
        {isNew&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:22}}>
            <div style={{position:'relative',width:76,height:76,marginBottom:16}}>
              <div style={{position:'absolute',inset:-12,borderRadius:'50%',border:'2px solid rgba(34,197,94,.25)',animation:'pulse 2.4s .5s ease-in-out infinite'}}/>
              <div style={{width:76,height:76,background:'linear-gradient(135deg,#166534,#22c55e)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 36px rgba(34,197,94,.3)',animation:'splash .45s cubic-bezier(.22,1,.36,1) both'}}>
                <svg width="34" height="34" fill="none" viewBox="0 0 24 24"><path stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="80" strokeDashoffset="80" style={{animation:'check .5s .45s ease forwards'}} d="M5 13l4 4L19 7"/></svg>
              </div>
            </div>
            <p style={{fontSize:22,fontWeight:800,color:'var(--t1)',marginBottom:4,letterSpacing:'-.5px'}}>{live.method==='squad'?'Payment Confirmed!':'Payment Submitted!'}</p>
            <p style={{fontSize:13,color:'var(--t3)'}}>{live.method==='squad'?'Verified instantly via Squad ✓':'Pending admin verification'}</p>
          </div>
        )}
        {!isNew&&<Hdr title="Receipt" sub={live.id} onBack={()=>navigate('history')}/>}

        {/* Receipt card */}
        <div style={{background:'#fff',borderRadius:24,overflow:'hidden',marginBottom:16,boxShadow:'0 8px 40px rgba(0,0,0,.4)'}}>
          <div style={{background:'linear-gradient(135deg,#0ea5e9,#2563eb)',padding:'18px 20px 16px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:22}}>{cat.icon}</span>
                <div>
                  <p style={{fontSize:12,color:'rgba(255,255,255,.65)',fontWeight:600}}>{ORG.name} · {ORG.session}</p>
                  <p style={{fontSize:15,fontWeight:800,color:'#fff'}}>{cat.label}</p>
                </div>
              </div>
              <StatusBadge status={live.status}/>
            </div>
            <p style={{fontSize:30,fontWeight:800,color:'#fff',letterSpacing:'-1px'}}>{fmt(live.amount)}</p>
          </div>
          <div style={{padding:'18px 20px'}}>
            {[{l:'Student',v:live.name},{l:'Matric',v:live.matric},{l:'Level',v:live.level+'L'},{l:'Category',v:cat.label},{l:'Method',v:live.method==='squad'?'Online (Squad)':'Manual / Cash'},...(live.squad_ref?[{l:'Squad Ref',v:live.squad_ref}]:[]),...(live.note?[{l:'Note',v:live.note}]:[]),{l:'Date',v:fmtDate(live.created_at)},{l:'Time',v:fmtTime(live.created_at)},{l:'Session',v:ORG.session}].map(r=>(
              <div key={r.l} className="irow">
                <span style={{fontSize:12,color:'#6b7280',fontWeight:500,flex:'0 0 80px'}}>{r.l}</span>
                <span style={{fontSize:12,fontWeight:700,color:'#111827',textAlign:'right',flex:1,wordBreak:'break-all'}}>{r.v}</span>
              </div>
            ))}
            <div style={{background:'#f8fafc',borderRadius:10,padding:'10px 12px',marginTop:12,marginBottom:16}}>
              <p style={{fontSize:10,color:'#9ca3af',fontWeight:600,letterSpacing:'.5px',textTransform:'uppercase',marginBottom:3}}>Payment ID</p>
              <p style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'#374151',wordBreak:'break-all'}}>{live.id}</p>
            </div>
            {/* Tear */}
            <div style={{display:'flex',alignItems:'center',overflow:'hidden',margin:'0 -20px 16px'}}>
              <div style={{width:16,height:16,borderRadius:'50%',background:'#f2f3f7',border:'1px solid #e8eaed',marginLeft:-8,flexShrink:0}}/>
              <div style={{flex:1,borderTop:'1.5px dashed #e2e8f0'}}/>
              <div style={{width:16,height:16,borderRadius:'50%',background:'#f2f3f7',border:'1px solid #e8eaed',marginRight:-8,flexShrink:0}}/>
            </div>
            {/* QR */}
            <div style={{background:'#f0f9ff',border:'1.5px solid #bae6fd',borderRadius:16,padding:'16px',display:'flex',flexDirection:'column',alignItems:'center'}}>
              <p style={{fontSize:13,fontWeight:800,color:'#0369a1',marginBottom:4}}>📱 Verification QR</p>
              <p style={{fontSize:11,color:'#0284c7',marginBottom:12,textAlign:'center',lineHeight:1.55}}>
                {live.status==='verified'?'Payment verified ✓ Show this to any NACOS official':'Show to a NACOS official to confirm your payment'}
              </p>
              <div style={{background:'#fff',borderRadius:14,padding:12,boxShadow:'0 2px 12px rgba(0,0,0,.08)'}}>
                <div id="qr-receipt" ref={qrRef}/>
              </div>
              <div style={{marginTop:10}}><StatusBadge status={live.status}/></div>
              {live.status==='pending'&&<p style={{fontSize:11,color:'#6b7280',marginTop:6,textAlign:'center'}}>Verification takes up to 24 hours</p>}
            </div>
          </div>
        </div>

        {/* Action buttons */}
        <div style={{display:'flex',gap:10,marginBottom:10}}>
          <button className="btn btn-s" style={{flex:1}} onClick={()=>setShowPrint(true)}>
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
            View & Print
          </button>
          <button className="btn btn-s" style={{flex:1}} onClick={handleDownload} disabled={downloading}>
            {downloading?<><div className="spin spin-dark"/>Saving…</>:<><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>Download</>}
          </button>
        </div>
        <button className="btn btn-p" onClick={()=>navigate('dashboard')}>Done</button>
      </div>
      <div style={{height:40}}/>
    </div>
  );
};

/* ═══════════════════════════════
   PrintQR — renders QR inside the print view
   Waits 80ms after mount so the overlay animation is done first
═══════════════════════════════ */
const PrintQR=({payment})=>{
  const ref=useRef(null);
  useEffect(()=>{
    let alive=true;
    const t=setTimeout(()=>{
      if(!alive||!ref.current||!window.QRCode)return;
      ref.current.innerHTML='';
      new window.QRCode(ref.current,{
        text:JSON.stringify({type:'nacos_payment_receipt',payment_id:payment.id,name:payment.name,matric:payment.matric,category:payment.category,amount:payment.amount,status:payment.status,org:ORG.name,session:ORG.session,timestamp:payment.created_at}),
        width:160,height:160,colorDark:'#0f172a',colorLight:'#ffffff',
      });
    },80);
    return()=>{ alive=false; clearTimeout(t); };
  },[payment.id, payment.status]);
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'12px 0'}}>
      <p style={{fontSize:12,fontWeight:700,color:'#0369a1',marginBottom:8}}>📱 Scan to Verify</p>
      <div style={{background:'#fff',borderRadius:12,padding:10,border:'1px solid #e2e8f0'}}><div ref={ref}/></div>
      <div style={{marginTop:8}}><StatusBadge status={payment.status}/></div>
    </div>
  );
};

/* ═══════════════════════════════
   VERIFY SCREEN — with school desk QR display
═══════════════════════════════ */
const DESK_QR_PAYLOAD = JSON.stringify({type:'nacos_verify_desk',org:ORG.name,session:ORG.session,action:'verify_payment'});

const VerifyScreen=()=>{
  const {navigate,allPayments,categories}=useApp();
  const videoRef=useRef(null),canvasRef=useRef(null),rafRef=useRef(null),streamRef=useRef(null);
  const deskQrRef=useRef(null),verifyQrRef=useRef(null);
  const [query,setQuery]=useState('');
  const [result,setResult]=useState(null);
  const [noResult,setNoResult]=useState(false);
  const [scanning,setScanning]=useState(false);
  const [showCam,setShowCam]=useState(false);
  const [showDeskQR,setShowDeskQR]=useState(false);

  const doSearch=(q)=>{
    const s=q||query;
    if(!s.trim())return;
    const p=allPayments.find(p=>
      p.id.toLowerCase()===s.trim().toLowerCase()||
      p.matric===s.trim()||
      (p.email&&p.email.toLowerCase()===s.trim().toLowerCase())||
      (p.phone&&p.phone.replace(/\D/g,'')===s.trim().replace(/\D/g,''))
    );
    setResult(p||null); setNoResult(!p);
  };

  useEffect(()=>{
    if(!showDeskQR)return;
    let alive=true;
    const t=setTimeout(()=>{
      if(!alive||!deskQrRef.current||!window.QRCode)return;
      deskQrRef.current.innerHTML='';
      new window.QRCode(deskQrRef.current,{text:DESK_QR_PAYLOAD,width:200,height:200,colorDark:'#0f172a',colorLight:'#ffffff'});
    },80);
    return()=>{ alive=false; clearTimeout(t); };
  },[showDeskQR]);

  useEffect(()=>{
    let alive=true;
    const t=setTimeout(()=>{
      if(!alive||!result||!verifyQrRef.current||!window.QRCode)return;
      verifyQrRef.current.innerHTML='';
      new window.QRCode(verifyQrRef.current,{
        text:JSON.stringify({type:'nacos_payment_receipt',payment_id:result.id,name:result.name,matric:result.matric,category:result.category,amount:result.amount,status:result.status,org:ORG.name,session:ORG.session,timestamp:result.created_at}),
        width:120,height:120,colorDark:'#0f172a',colorLight:'#ffffff',
      });
    },80);
    return()=>{ alive=false; clearTimeout(t); };
  },[result?.id, result?.status]);

  const startCam=async()=>{
    setShowCam(true);
    try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});streamRef.current=s;if(videoRef.current){videoRef.current.srcObject=s;videoRef.current.play();setScanning(true);}}
    catch(_){setShowCam(false);}
  };
  const tick=useCallback(()=>{
    const v=videoRef.current,c=canvasRef.current;
    if(!v||!c||v.readyState!==v.HAVE_ENOUGH_DATA){rafRef.current=requestAnimationFrame(tick);return;}
    c.width=v.videoWidth;c.height=v.videoHeight;
    const ctx=c.getContext('2d');ctx.drawImage(v,0,0);
    const img=ctx.getImageData(0,0,c.width,c.height);
    const code=window.jsQR&&window.jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
    if(code){
      try{const d=JSON.parse(code.data);if(d.type==='nacos_payment_receipt'&&d.payment_id){stopCam();doSearch(d.payment_id);return;}}catch(_){}
    }
    rafRef.current=requestAnimationFrame(tick);
  },[allPayments]);
  useEffect(()=>{if(scanning){rafRef.current=requestAnimationFrame(tick);}return()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current);};},[scanning,tick]);
  const stopCam=()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current);if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());setScanning(false);setShowCam(false);};

  const cat=result?categories.find(c=>c.id===result.category):null;

  /* Desk QR sheet */
  if(showDeskQR) return(
    <div className="pg page-body" style={{background:'var(--bg)'}}>
      <Hdr title="Verification Desk QR" sub="Print & display at payment desk" onBack={()=>setShowDeskQR(false)}/>
      <div style={{padding:'0 16px 32px'}}>
        <div style={{background:'#fff',borderRadius:24,padding:'28px',display:'flex',flexDirection:'column',alignItems:'center',boxShadow:'0 8px 40px rgba(0,0,0,.4)'}}>
          <div style={{fontSize:44,marginBottom:12}}>🏛️</div>
          <p style={{fontSize:18,fontWeight:800,color:'#111827',marginBottom:4}}>{ORG.name}</p>
          <p style={{fontSize:13,color:'#6b7280',marginBottom:4}}>{ORG.full}</p>
          <p style={{fontSize:12,color:'#9ca3af',marginBottom:20}}>{ORG.school} · {ORG.session}</p>
          <div style={{background:'#f8fafc',borderRadius:16,padding:16,marginBottom:16,border:'2px dashed #e2e8f0'}}>
            <div ref={deskQrRef}/>
          </div>
          <p style={{fontSize:14,fontWeight:700,color:'#0ea5e9',marginBottom:6}}>📱 Scan to Verify Payment</p>
          <p style={{fontSize:12,color:'#6b7280',textAlign:'center',lineHeight:1.6}}>Students scan this QR to open the payment verification screen. Display at the bursary desk or notice board.</p>
        </div>
        <button className="btn btn-p" style={{marginTop:16}} onClick={handleDownload}>
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
          Save / Print QR
        </button>
      </div>
    </div>
  );

  function handleDownload(){
    const canvas=document.createElement('canvas');canvas.width=600;canvas.height=700;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#fff';ctx.fillRect(0,0,600,700);
    const g=ctx.createLinearGradient(0,0,600,140);g.addColorStop(0,'#0ea5e9');g.addColorStop(1,'#2563eb');
    ctx.fillStyle=g;ctx.fillRect(0,0,600,140);
    ctx.fillStyle='#fff';ctx.font='800 32px DM Sans,sans-serif';ctx.textAlign='center';ctx.fillText('NACOS-LASU',300,60);
    ctx.font='500 16px DM Sans,sans-serif';ctx.fillStyle='rgba(255,255,255,.7)';ctx.fillText('Scan to Verify Payment',300,90);
    ctx.fillText(ORG.session,300,115);
    ctx.fillStyle='#0ea5e9';ctx.font='700 18px DM Sans,sans-serif';ctx.fillText('📱 Scan QR Code to Verify Your Payment',300,480);
    ctx.fillStyle='#6b7280';ctx.font='500 14px DM Sans,sans-serif';ctx.fillText(`${ORG.full} · ${ORG.school}`,300,510);
    ctx.textAlign='left';
    const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download='NACOS-Verify-QR.png';a.click();
  }

  return(
    <div className="pg page-body" style={{background:'var(--bg)'}}>
      <Hdr title="Verify Payment" sub="Search or scan a receipt QR" onBack={()=>{stopCam();navigate('dashboard');}}
        right={<button onClick={()=>setShowDeskQR(true)} style={{padding:'6px 12px',background:'rgba(14,165,233,.12)',border:'1px solid rgba(14,165,233,.2)',borderRadius:10,color:'var(--nacos)',fontSize:12,fontWeight:600,cursor:'pointer'}}>Desk QR</button>}
      />
      <div style={{padding:'0 16px 32px'}}>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          <button className="btn btn-s" style={{flex:1,fontSize:13,padding:'12px'}} onClick={showCam?stopCam:startCam}>
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.8} d="M3 9V5a2 2 0 012-2h4M3 15v4a2 2 0 002 2h4M21 9V5a2 2 0 00-2-2h-4M21 15v4a2 2 0 01-2 2h-4"/><rect x="9" y="9" width="6" height="6" rx="1" strokeWidth={1.8}/></svg>
            {showCam?'Stop Camera':'Scan Receipt QR'}
          </button>
        </div>
        {showCam&&(
          <div style={{borderRadius:20,overflow:'hidden',position:'relative',background:'#000',aspectRatio:'4/3',marginBottom:14,maxHeight:220}}>
            <video ref={videoRef} style={{width:'100%',height:'100%',objectFit:'cover',display:scanning?'block':'none'}} playsInline muted autoPlay/>
            <canvas ref={canvasRef} style={{display:'none'}}/>
            {scanning&&<div className="sover"><div className="sframe" style={{width:160,height:160}}>
              {[['top','left'],['top','right'],['bottom','left'],['bottom','right']].map(([v,h],i)=>(<div key={i} className="scnr" style={{[v]:0,[h]:0,borderTop:v==='top'?'2.5px solid #38bdf8':'none',borderBottom:v==='bottom'?'2.5px solid #38bdf8':'none',borderLeft:h==='left'?'2.5px solid #38bdf8':'none',borderRight:h==='right'?'2.5px solid #38bdf8':'none'}}/>))}
              <div className="sbeam" style={{top:'22%'}}/>
            </div></div>}
          </div>
        )}
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          <input className="inp" style={{flex:1}} placeholder="Payment ID, matric, email or phone…" value={query}
            onChange={e=>{setQuery(e.target.value);setResult(null);setNoResult(false);}}
            onKeyDown={e=>e.key==='Enter'&&doSearch()}/>
          <button className="btn btn-p" style={{width:'auto',padding:'0 18px',borderRadius:13,fontSize:14,flexShrink:0}} onClick={()=>doSearch()}>Search</button>
        </div>
        {noResult&&(
          <div style={{background:'rgba(244,63,94,.08)',border:'1px solid rgba(244,63,94,.2)',borderRadius:14,padding:'24px',textAlign:'center'}}>
            <p style={{fontSize:28,marginBottom:8}}>🔍</p>
            <p style={{fontSize:14,fontWeight:700,color:'var(--t1)',marginBottom:4}}>No payment found</p>
            <p style={{fontSize:12,color:'var(--t3)'}}>Check the details and try again</p>
          </div>
        )}
        {result&&cat&&(
          <div style={{background:'#fff',borderRadius:20,overflow:'hidden',animation:'fade .3s ease',boxShadow:'0 4px 20px rgba(0,0,0,.3)'}}>
            <div style={{background:result.status==='verified'?'linear-gradient(135deg,#166534,#22c55e)':result.status==='rejected'?'linear-gradient(135deg,#9f1239,#f43f5e)':'linear-gradient(135deg,#92400e,#f59e0b)',padding:'16px 20px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <p style={{fontSize:12,color:'rgba(255,255,255,.65)',marginBottom:3}}>{cat.icon} {cat.label}</p>
                  <p style={{fontSize:24,fontWeight:800,color:'#fff',letterSpacing:'-.5px'}}>{fmt(result.amount)}</p>
                </div>
                <span style={{fontSize:40}}>{result.status==='verified'?'✅':result.status==='rejected'?'❌':'⏳'}</span>
              </div>
            </div>
            <div style={{padding:'16px 20px'}}>
              {[{l:'Name',v:result.name},{l:'Matric',v:result.matric},{l:'Level',v:result.level+'L'},{l:'Category',v:cat.label},{l:'Date',v:fmtDate(result.created_at)},{l:'Session',v:ORG.session}].map(r=>(
                <div key={r.l} className="irow"><span style={{fontSize:12,color:'#6b7280',fontWeight:500,flex:'0 0 80px'}}>{r.l}</span><span style={{fontSize:12,fontWeight:700,color:'#111827',flex:1,textAlign:'right'}}>{r.v}</span></div>
              ))}
              <div style={{background:'#f8fafc',borderRadius:8,padding:'8px 10px',margin:'10px 0',fontFamily:'DM Mono,monospace',fontSize:10,color:'#374151',wordBreak:'break-all'}}>{result.id}</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:8}}>
                <StatusBadge status={result.status}/>
                <div ref={verifyQrRef}/>
              </div>
            </div>
          </div>
        )}
        {!result&&!noResult&&(
          <div style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:14,padding:'16px'}}>
            <p style={{fontSize:13,fontWeight:600,color:'var(--t1)',marginBottom:10}}>Search by</p>
            {['Payment ID (e.g. PAY-XXXXX-XXXX)','Matric number (e.g. 220591363)','Email address','Phone number'].map(t=>(
              <div key={t} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                <div style={{width:5,height:5,borderRadius:'50%',background:'var(--nacos)',flexShrink:0}}/>
                <p style={{fontSize:12,color:'var(--t2)'}}>{t}</p>
              </div>
            ))}
          </div>
        )}

const HistoryScreen=()=>{
  const {payments,navigate,categories}=useApp();
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');

  const filtered=payments
    .filter(p=>filter==='all'?true:p.status===filter)
    .filter(p=>{
      if(!search.trim())return true;
      const q=search.toLowerCase();
      const cat=categories.find(c=>c.id===p.category);
      return(
        (cat&&cat.label.toLowerCase().includes(q))||
        p.id.toLowerCase().includes(q)||
        fmtDate(p.created_at).toLowerCase().includes(q)
      );
    });

  const totalFilt=filtered.reduce((s,p)=>s+p.amount,0);

  // Group by date label
  const grouped=useMemo(()=>{
    const groups={};
    filtered.forEach(p=>{
      const d=new Date(p.created_at);
      const now=new Date();
      const diffDays=Math.floor((now-d)/86400000);
      const label=diffDays===0?'Today':diffDays===1?'Yesterday':fmtDate(p.created_at);
      if(!groups[label])groups[label]=[];
      groups[label].push(p);
    });
    return groups;
  },[filtered]);

  return(
    <div className="pg page-body" style={{background:'var(--bg)'}}>
      <Hdr title="Payment History" sub={`${filtered.length} payment${filtered.length!==1?'s':''}`} onBack={()=>navigate('dashboard')}/>
      <div style={{padding:'0 16px 32px'}}>
        {/* Search */}
        <div style={{position:'relative',marginBottom:12}}>
          <div style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}}>
            <svg width="15" height="15" fill="none" stroke="var(--t3)" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </div>
          <input className="inp" style={{paddingLeft:40}} placeholder="Search category, date or payment ID…"
            value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>

        {/* Filter pills */}
        <div style={{display:'flex',gap:8,marginBottom:14,overflowX:'auto',paddingBottom:2}}>
          {[['all','All'],['pending','Pending'],['verified','Verified'],['rejected','Rejected']].map(([k,l])=>(
            <button key={k} onClick={()=>setFilter(k)} style={{padding:'8px 14px',borderRadius:99,cursor:'pointer',transition:'all .12s ease',border:`1.5px solid ${filter===k?'var(--nacos)':'var(--b2)'}`,background:filter===k?'rgba(14,165,233,.12)':'var(--s2)',color:filter===k?'var(--nacos)':'var(--t2)',fontSize:12,fontWeight:600,flexShrink:0}}>
              {l}
            </button>
          ))}
        </div>

        {/* Total */}
        {filtered.length>0&&(
          <div style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:14,padding:'12px 16px',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <p style={{fontSize:12,color:'var(--t3)'}}>Total for selection</p>
            <p style={{fontSize:16,fontWeight:800,color:'var(--t1)'}}>{fmt(totalFilt)}</p>
          </div>
        )}

        {filtered.length===0?(
          <div style={{background:'var(--s1)',border:'1px solid var(--b1)',borderRadius:18,padding:'48px 20px',textAlign:'center'}}>
            <p style={{fontSize:40,marginBottom:12}}>🧾</p>

        ):(
          <div style={{display:'flex',flexDirection:'column',gap:20}}>
            {Object.entries(grouped).map(([dateLabel,group])=>(
              <div key={dateLabel}>
                <p style={{fontSize:11,fontWeight:700,color:'var(--t3)',letterSpacing:'.6px',textTransform:'uppercase',marginBottom:8,paddingLeft:4}}>{dateLabel}</p>

/* ═══════════════════════════════
   CSV EXPORT HELPER
═══════════════════════════════ */
function exportCSV(payments, cats) {
  const headers = ['Payment ID','Student Name','Matric','Level','Email','Phone','Category','Amount','Status','Method','Squad Ref','Date','Time','Note','Session'];
  const rows = payments.map(p => {
    const cat = cats.find(c=>c.id===p.category)||{label:'Unknown'};
    return [
      p.id, p.name, p.matric, p.level+'L', p.email||'', p.phone||'',
      cat.label, p.amount, p.status,
      p.method==='squad'?'Online (Squad)':'Manual / Cash',
      p.squad_ref||'',
      fmtDate(p.created_at), fmtTime(p.created_at),
      p.note||'', ORG.session,
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${ORG.name.replace(/\s/g,'-')}-payments-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
